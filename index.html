  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SITE_URL   = 'https://teloreportosos-vzla.vercel.app';
    const VZ_GRAD    = 'linear-gradient(to right, #CF8B00, #002FA7, #CF0A2C)';
    const ZONES      = [
      'Libertador (Caracas)', 'Chacao', 'Baruta', 'El Hatillo', 'Sucre (Petare)',
      'La Guaira / Vargas', 'Los Teques / Miranda', 'Guarenas / Guatire',
      'Maracay / Aragua', 'Valencia / Carabobo', 'Maracaibo / Zulia',
      'Barquisimeto / Lara', 'San Cristóbal / Táchira', 'Otra zona'
    ];
    const ANIMAL_TYPES = ['Perro', 'Gato', 'Ave', 'Reptil', 'Otro'];

    // ─── TOAST ─────────────────────────────────────────────────────────────────
    let _setToasts = null;
    const toast = (msg, type = 'success') => {
      if (_setToasts) _setToasts(p => [...p, { id: Date.now() + Math.random(), msg, type }]);
    };

    function Toasts() {
      const [toasts, setToasts] = useState([]);
      _setToasts = setToasts;
      useEffect(() => {
        if (!toasts.length) return;
        const t = setTimeout(() => setToasts(p => p.slice(1)), 3800);
        return () => clearTimeout(t);
      }, [toasts]);
      return (
        <div className="fixed top-4 left-4 right-4 z-[60] flex flex-col gap-2 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className={`px-4 py-3 rounded-xl shadow-lg text-white text-sm font-semibold text-center
              ${t.type === 'error' ? 'bg-red-600' : t.type === 'info' ? 'bg-blue-600' : 'bg-green-600'}`}>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }

    // ─── HELPERS ───────────────────────────────────────────────────────────────
    const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

    const timeAgo = (ts) => {
      if (!ts) return '';
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60) return 'hace un momento';
      if (diff < 3600) return `hace ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `hace ${Math.floor(diff / 3600)} h`;
      return `hace ${Math.floor(diff / 86400)} días`;
    };

    // ─── REPORT CARD ───────────────────────────────────────────────────────────
    function ReportCard({ report, onClick }) {
      const isFound  = report.status === 'encontrado';
      const isPerson = report.type === 'persona';

      const shareWhatsApp = (e) => {
        e.stopPropagation();
        const emoji = isPerson ? '👤' : '🐾';
        const text = [
          `🆘 *REPORTE SOS VZL*`,
          `${emoji} *${report.name}*${report.age ? ` (${report.age})` : ''}${report.animalType ? ` — ${report.animalType}` : ''}`,
          `📍 *Zona:* ${report.zone}`,
          report.lastSeen ? `🗺 *Visto en:* ${report.lastSeen}` : null,
          `📝 ${report.description?.substring(0, 120)}`,
          `📞 *Contacto:* ${report.contactName} — ${report.contact}`,
          ``,
          `🔗 ${SITE_URL}`,
        ].filter(Boolean).join('\n');
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      };

      return (
        <div
          onClick={() => onClick(report)}
          className="bg-white rounded-2xl shadow-sm hover:shadow-md border border-gray-100 overflow-hidden cursor-pointer active:scale-[0.99] transition-all"
        >
          {/* Color bar top */}
          <div className="h-1" style={{background: isFound ? '#16a34a' : '#dc2626'}} />

          <div className="p-4">
            <div className="flex gap-3">
              {report.photoURL
                ? <img src={report.photoURL} alt={report.name}
                    className="w-16 h-16 rounded-xl object-cover flex-shrink-0 border border-gray-100" />
                : <div className={`w-16 h-16 rounded-xl flex items-center justify-center flex-shrink-0 text-3xl
                    ${isPerson ? 'bg-blue-50' : 'bg-orange-50'}`}>
                    {isPerson ? '👤' : '🐾'}
                  </div>
              }
              <div className="flex-1 min-w-0">
                <div className="flex items-start justify-between gap-2 mb-1">
                  <h3 className="font-bold text-gray-900 truncate text-[15px]">{report.name}</h3>
                  <span className={`flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide
                    ${isFound ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                    {isFound ? '✓ Encontrado' : '⚠ Buscando'}
                  </span>
                </div>
                <p className="text-sm text-gray-500 line-clamp-2 leading-snug">{report.description}</p>
                <div className="flex items-center gap-3 mt-2 text-xs text-gray-400">
                  <span className="flex items-center gap-1">📍 {report.zone}</span>
                  <span>·</span>
                  <span>{timeAgo(report.createdAt)}</span>
                </div>
              </div>
            </div>

            <div className="flex gap-2 mt-3 pt-3 border-t border-gray-50">

                onClick={shareWhatsApp}
                className="flex-1 bg-green-500 hover:bg-green-600 text-white text-sm font-semibold py-2 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-colors"
              >
                📲 Compartir
              </button>
              <button className="px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold py-2 rounded-xl active:scale-95 transition-colors">
                Ver más →

    // ─── FEED VIEW ─────────────────────────────────────────────────────────────
    function FeedView({ onSelect, onNew }) {
      const [reports, setReports]           = useState([]);
      const [loading, setLoading]           = useState(true);
      const [filterType, setFilterType]     = useState('all');
      const [filterStatus, setFilterStatus] = useState('desaparecido');
      const [search, setSearch]             = useState('');

      useEffect(() => {
        const unsub = db.collection('reports')
          .orderBy('createdAt', 'desc')
          .limit(200)
          .onSnapshot(
            snap => { setReports(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); },
            ()   => { toast('Error cargando reportes', 'error'); setLoading(false); }
          );
        return unsub;
      }, []);

      const filtered = reports.filter(r => {
        if (filterType !== 'all' && r.type !== filterType) return false;
        if (filterStatus !== 'all' && r.status !== filterStatus) return false;
        if (search) {
          const q = search.toLowerCase();
          return r.name?.toLowerCase().includes(q)
            || r.zone?.toLowerCase().includes(q)
            || r.description?.toLowerCase().includes(q);
        }
        return true;
      });

      return (
        <div className="max-w-2xl mx-auto px-4 pb-12">
          {/* Banner emergencia */}
          <div className="mt-5 mb-4 rounded-2xl overflow-hidden shadow-sm border border-red-200">
            <div className="h-1.5" style={{background: VZ_GRAD}} />
            <div className="bg-red-50 px-4 py-3 flex items-center gap-3">
              <span className="text-2xl flex-shrink-0">🆘</span>
              <div>
                <p className="font-bold text-red-800 text-sm">Sismo 7.5 · Venezuela · Junio 2026</p>
                <p className="text-red-600 text-xs mt-0.5">
                  Publica o busca personas y mascotas desaparecidas. Comparte el enlace para que llegue a más gente.
                </p>
              </div>
            </div>
          </div>

          {/* Buscador */}
          <div className="relative mb-3">
            <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
            <input
              type="search"
              placeholder="Buscar por nombre, zona o descripción..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              className="w-full border border-gray-200 bg-white rounded-xl pl-9 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm"
            />
          </div>

          {/* Filtros */}
          <div className="flex gap-2 mb-2 overflow-x-auto pb-1">
            {[['all','Todos'],['persona','👤 Personas'],['mascota','🐾 Mascotas']].map(([v,l]) => (
              <button key={v} onClick={() => setFilterType(v)}
                className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition-colors
                  ${filterType === v
                    ? 'text-white shadow-sm'
                    : 'bg-white text-gray-500 border border-gray-200 hover:border-gray-300'}`}
                style={filterType === v ? {background: VZ_GRAD} : {}}>
                {l}
              </button>
            ))}
          </div>
          <div className="flex gap-2 mb-5">
            {[['all','Todos'],['desaparecido','⚠ Buscando'],['encontrado','✓ Encontrados']].map(([v,l]) => (
              <button key={v} onClick={() => setFilterStatus(v)}
                className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold transition-colors
                  ${filterStatus === v
                    ? 'bg-gray-800 text-white'
                    : 'bg-white text-gray-500 border border-gray-200 hover:border-gray-300'}`}>
                {l}
              </button>
            ))}
          </div>

          {/* Lista */}
          {loading ? (
            <div className="space-y-3">
              {[1,2,3].map(i => (
                <div key={i} className="bg-white rounded-2xl border border-gray-100 p-4 animate-pulse">
                  <div className="flex gap-3">
                    <div className="w-16 h-16 rounded-xl bg-gray-100 flex-shrink-0" />
                    <div className="flex-1 space-y-2 pt-1">
                      <div className="h-4 bg-gray-100 rounded w-2/3" />
                      <div className="h-3 bg-gray-100 rounded w-full" />
                      <div className="h-3 bg-gray-100 rounded w-1/2" />
                    </div>
                  </div>
                </div>
              ))}
            </div>
          ) : filtered.length === 0 ? (
            <div className="text-center py-16 text-gray-400 bg-white rounded-2xl border border-gray-100 shadow-sm">
              <div className="text-5xl mb-3">{reports.length === 0 ? '📋' : '🔍'}</div>
              <p className="font-semibold text-gray-600 text-base">
                {reports.length === 0 ? 'Aún no hay reportes' : 'Sin resultados'}
              </p>
              <p className="text-sm mt-1 text-gray-400">
                {reports.length === 0 ? 'Sé el primero en publicar' : 'Prueba cambiando los filtros'}
              </p>
              {reports.length === 0 && (
                <button
                  onClick={onNew}
                  className="mt-5 text-white font-bold px-8 py-3 rounded-2xl text-sm shadow"
                  style={{background: VZ_GRAD}}
                >
                  + Crear primer reporte
                </button>
              )}
            </div>
          ) : (
            <>
              <p className="text-xs text-gray-400 mb-3 font-medium">
                {filtered.length} resultado{filtered.length !== 1 ? 's' : ''}
                {search || filterType !== 'all' || filterStatus !== 'all' ? ' (filtrado)' : ''}
              </p>
              <div className="flex flex-col gap-3">
                {filtered.map(r => <ReportCard key={r.id} report={r} onClick={onSelect} />)}
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── CROP MODAL ────────────────────────────────────────────────────────────
    function CropModal({ imageSrc, onConfirm, onCancel }) {
      const imgRef     = useRef();
      const cropperRef = useRef();

      useEffect(() => {
        if (!imgRef.current) return;
        cropperRef.current = new Cropper(imgRef.current, {
          aspectRatio:   1,
          viewMode:      1,
          dragMode:      'move',
          autoCropArea:  0.85,
          responsive:    true,
          checkOrientation: true,
          movable:       true,
          rotatable:     false,
          scalable:      false,
          zoomable:      true,
          zoomOnTouch:   true,
          zoomOnWheel:   true,
        });
        return () => { cropperRef.current?.destroy(); };
      }, [imageSrc]);

      const confirm = () => {
        const canvas = cropperRef.current.getCroppedCanvas({
          width: 900, height: 900, imageSmoothingQuality: 'high'
        });
        canvas.toBlob(blob => onConfirm(blob, URL.createObjectURL(blob)), 'image/jpeg', 0.88);
      };

      return (
        <div className="fixed inset-0 z-50 flex flex-col" style={{background:'#111'}}>
          <div className="flex items-center justify-between px-4 py-3 bg-gray-900 flex-shrink-0">
            <button onClick={onCancel}
              className="text-gray-300 font-semibold px-3 py-2 rounded-xl hover:bg-gray-700 transition">
              Cancelar
            </button>
            <div className="text-center">
              <p className="text-white font-bold text-sm">Encuadra la foto</p>
              <p className="text-gray-400 text-xs">Arrastra · Pellizca para zoom</p>
            </div>
            <button onClick={confirm}
              className="bg-blue-500 hover:bg-blue-600 text-white font-bold px-4 py-2 rounded-xl transition active:scale-95">
              ✓ Usar
            </button>
          </div>
          <div className="flex-1 overflow-hidden">
            <img ref={imgRef} src={imageSrc} alt="crop" style={{display:'block', maxWidth:'100%'}} />
          </div>
        </div>
      );
    }

    // ─── NEW REPORT FORM ───────────────────────────────────────────────────────
    function NewReportView({ onBack, onSuccess }) {
      const [type, setType]       = useState('persona');
      const [saving, setSaving]   = useState(false);
      const [photo, setPhoto]     = useState(null);
      const [preview, setPreview] = useState(null);
      const [cropSrc, setCropSrc] = useState(null);
      const [form, setForm]       = useState({
        name: '', age: '', animalType: 'Perro', breed: '',
        description: '', lastSeen: '', zone: '',
        contactName: '', contact: ''
      });
      const fileRef = useRef();
      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const handlePhoto = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { toast('La foto debe ser menor a 10 MB', 'error'); return; }
        e.target.value = '';
        setCropSrc(URL.createObjectURL(file));
      };

      const handleCropConfirm = (blob, previewURL) => {
        setPhoto(blob);
        setPreview(previewURL);
        setCropSrc(null);
      };

      const uploadPhoto = async () => {
        if (!photo) return null;
        try {
          const fd = new FormData();
          fd.append('file', photo, 'photo.jpg');
          fd.append('upload_preset', CLOUDINARY_PRESET);
          const res  = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
          const data = await res.json();
          return data.secure_url || null;
        } catch { return null; }
      };

      const submit = async () => {
        if (!form.name.trim())        { toast('Ingresa el nombre', 'error'); return; }
        if (!form.description.trim()) { toast('Agrega una descripción', 'error'); return; }
        if (!form.zone)               { toast('Selecciona la zona', 'error'); return; }
        if (!form.contactName.trim()) { toast('Ingresa tu nombre', 'error'); return; }
        if (!form.contact.trim())     { toast('Ingresa un número de contacto', 'error'); return; }

        setSaving(true);
        try {
          const code   = generateCode();
          const docRef = await db.collection('reports').add({
            type,
            status:      'desaparecido',
            name:        form.name.trim(),
            age:         type === 'persona' ? form.age.trim() : null,
            animalType:  type === 'mascota' ? form.animalType : null,
            breed:       type === 'mascota' ? form.breed.trim() : null,
            description: form.description.trim(),
            lastSeen:    form.lastSeen.trim(),
            zone:        form.zone,
            contactName: form.contactName.trim(),
            contact:     form.contact.trim(),
            photoURL:    null,
            editCode:    code,
            createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
          });
          const photoURL = await uploadPhoto();
          if (photoURL) await docRef.update({ photoURL });
          onSuccess({ code, name: form.name.trim() });
        } catch {
          toast('Error al guardar. Intenta de nuevo.', 'error');
          setSaving(false);
        }
      };

      const inp  = "w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white transition";
      const lbl  = "block text-sm font-semibold text-gray-700 mb-1.5";
      const card = "bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4 flex flex-col gap-4";

      return (
        <>
        <div className="max-w-2xl mx-auto px-4 pb-12">
          {/* Page header */}
          <div className="flex items-center gap-3 py-5">
            <button onClick={onBack}
              className="p-2 rounded-xl bg-white border border-gray-200 text-gray-500 hover:bg-gray-50 transition shadow-sm">
              ←
            </button>
            <div>
              <h2 className="font-bold text-lg text-gray-900 leading-tight">Nuevo Reporte</h2>
              <p className="text-xs text-gray-400">Todos los campos marcados con * son obligatorios</p>
            </div>
          </div>

          {/* Tipo */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
            <p className={lbl}>¿Qué estás reportando? *</p>
            <div className="grid grid-cols-2 gap-3">
              {[['persona','👤','Persona'],['mascota','🐾','Mascota']].map(([v,icon,l]) => (
                <button key={v} onClick={() => setType(v)}
                  className={`py-4 rounded-xl border-2 font-bold text-sm transition-all
                    ${type === v
                      ? 'border-blue-500 bg-blue-50 text-blue-700 shadow-sm'
                      : 'border-gray-200 text-gray-400 hover:border-gray-300'}`}>
                  <div className="text-3xl mb-1.5">{icon}</div>
                  <div>{l} desaparecida</div>
                </button>
              ))}
            </div>
          </div>

          {/* Datos */}
          <div className={card}>
            <div>
              <label className={lbl}>{type === 'persona' ? 'Nombre completo *' : 'Nombre de la mascota'}</label>
              <input className={inp}
                placeholder={type === 'persona' ? 'Ej: María Rodríguez' : 'Ej: Max (o "sin nombre")'}
                value={form.name} onChange={e => set('name', e.target.value)} />
            </div>
            {type === 'persona' && (
              <div>
                <label className={lbl}>Edad</label>
                <input className={inp} placeholder="Ej: 34 años"
                  value={form.age} onChange={e => set('age', e.target.value)} />
              </div>
            )}
            {type === 'mascota' && (<>
              <div>
                <label className={lbl}>Tipo de animal *</label>
                <select className={inp} value={form.animalType} onChange={e => set('animalType', e.target.value)}>
                  {ANIMAL_TYPES.map(a => <option key={a}>{a}</option>)}
                </select>
              </div>
              <div>
                <label className={lbl}>Raza / Color</label>
                <input className={inp} placeholder="Ej: Labrador amarillo, mediano"
                  value={form.breed} onChange={e => set('breed', e.target.value)} />
              </div>
            </>)}
            <div>
              <label className={lbl}>{type === 'persona' ? 'Descripción física *' : 'Descripción *'}</label>
              <textarea className={`${inp} resize-none`} rows={3}
                placeholder={type === 'persona'
                  ? 'Ropa que llevaba, altura, color de cabello, señas particulares...'
                  : 'Tamaño, color, collar, señas particulares...'}
                value={form.description} onChange={e => set('description', e.target.value)} />
            </div>
            <div>
              <label className={lbl}>Último lugar donde fue visto/a</label>
              <input className={inp} placeholder="Ej: Av. Francisco de Miranda, frente al CC Sambil"
                value={form.lastSeen} onChange={e => set('lastSeen', e.target.value)} />
            </div>
            <div>
              <label className={lbl}>Zona / Estado *</label>
              <select className={inp} value={form.zone} onChange={e => set('zone', e.target.value)}>
                <option value="">Selecciona la zona...</option>
                {ZONES.map(z => <option key={z}>{z}</option>)}
              </select>
            </div>
          </div>

          {/* Foto */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
            <p className={lbl}>Foto <span className="font-normal text-gray-400">(muy útil para identificar)</span></p>
            {preview ? (
              <div className="relative">
                <img src={preview} alt="preview" className="w-full h-52 object-cover rounded-xl" />
                <button onClick={() => { setPhoto(null); setPreview(null); }}
                  className="absolute top-2 right-2 bg-gray-900/70 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm font-bold shadow">
                  ✕
                </button>
              </div>
            ) : (
              <button onClick={() => fileRef.current.click()}
                className="w-full h-36 border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center text-gray-400 hover:border-blue-400 hover:text-blue-400 transition-colors">
                <span className="text-4xl">📷</span>
                <span className="text-sm mt-2 font-medium">Toca para agregar foto</span>
                <span className="text-xs text-gray-300 mt-1">Cámara o galería · Máx 10 MB</span>
              </button>
            )}
            <input ref={fileRef} type="file" accept="image/*" capture="environment"
              className="hidden" onChange={handlePhoto} />
          </div>

          {/* Contacto */}
          <div className={card}>
            <div className="flex items-start gap-2 p-3 bg-blue-50 rounded-xl text-xs text-blue-700 font-medium mb-1">
              <span>ℹ️</span>
              <span>Este contacto es quien reporta. Las personas que vean el reporte podrán llamar o escribir a este número.</span>
            </div>
            <div>
              <label className={lbl}>Tu nombre *</label>
              <input className={inp} placeholder="¿Quién hace el reporte?"
                value={form.contactName} onChange={e => set('contactName', e.target.value)} />
            </div>
            <div>
              <label className={lbl}>WhatsApp / Teléfono *</label>
              <input className={inp} type="tel" placeholder="+58 412 000 0000"
                value={form.contact} onChange={e => set('contact', e.target.value)} />
            </div>
          </div>

          <button onClick={submit} disabled={saving}
            className="w-full text-white font-bold py-4 rounded-2xl text-base transition active:scale-95 shadow-md disabled:opacity-60"
            style={{background: saving ? '#9ca3af' : VZ_GRAD}}>
            {saving ? '⏳ Publicando reporte...' : '🆘 Publicar Reporte'}
          </button>
        </div>

        {cropSrc && (
          <CropModal
            imageSrc={cropSrc}
            onConfirm={handleCropConfirm}
            onCancel={() => setCropSrc(null)}
          />
        )}
        </>
      );
    }

    // ─── DETAIL VIEW ───────────────────────────────────────────────────────────
    function DetailView({ report: initial, onBack }) {
      const [report, setReport]           = useState(initial);
      const [showMarkFound, setShowFound] = useState(false);
      const [cropSrc, setCropSrc]         = useState(null);
      const [uploadingPhoto, setUploading] = useState(false);
      const [lightbox, setLightbox]       = useState(false);
      const photoFileRef = useRef();
      const isFound  = report.status === 'encontrado';
      const isPerson = report.type === 'persona';

      useEffect(() => {
        const unsub = db.collection('reports').doc(initial.id).onSnapshot(
          doc => { if (doc.exists) setReport({ id: doc.id, ...doc.data() }); }
        );
        return unsub;
      }, [initial.id]);

      const handlePhotoFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { toast('La foto debe ser menor a 10 MB', 'error'); return; }
        e.target.value = '';
        setCropSrc(URL.createObjectURL(file));
      };

      const handleCropConfirm = async (blob) => {
        setCropSrc(null);
        setUploading(true);
        try {
          const fd = new FormData();
          fd.append('file', blob, 'photo.jpg');
          fd.append('upload_preset', CLOUDINARY_PRESET);
          const res  = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
          const data = await res.json();
          const url  = data.secure_url;
          if (!url) throw new Error('sin URL');
          await db.collection('reports').doc(report.id).update({ photoURL: url });
          toast('Foto actualizada', 'success');
        } catch {
          toast('Error al subir la foto', 'error');
        }
        setUploading(false);
      };

      const shareWhatsApp = () => {
        const emoji = isPerson ? '👤' : '🐾';
        const lines = [
          `🆘 *REPORTE SOS VZL*`,
          `${emoji} *${report.name}*${report.age ? ` (${report.age})` : ''}${report.animalType ? ` — ${report.animalType}` : ''}`,
          `📍 *Zona:* ${report.zone}`,
          report.lastSeen ? `🗺 *Visto en:* ${report.lastSeen}` : null,
          `📝 ${report.description}`,
          `📞 *Contacto:* ${report.contactName} — ${report.contact}`,
          ``,
          `🔗 Ver más reportes: ${SITE_URL}`,
        ].filter(Boolean).join('\n');
        window.open(`https://wa.me/?text=${encodeURIComponent(lines)}`, '_blank');
      };

      return (
        <div className="max-w-2xl mx-auto px-4 pb-12">
          <div className="flex items-center gap-3 py-5">
            <button onClick={onBack}
              className="p-2 rounded-xl bg-white border border-gray-200 text-gray-500 hover:bg-gray-50 transition shadow-sm">
              ←
            </button>
            <h2 className="font-bold text-lg text-gray-900">Detalle del reporte</h2>
          </div>

          {/* Status */}
          <div className={`rounded-2xl p-3.5 mb-4 text-center font-bold
            ${isFound ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`}>
            {isFound ? '✅ ¡Esta persona/mascota fue ENCONTRADA!' : '⚠️ DESAPARECIDO/A — Necesita ayuda'}
          </div>

          {/* Lightbox */}
          {lightbox && report.photoURL && (
            <div
              className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4"
              onClick={() => setLightbox(false)}
            >
              <img src={report.photoURL} alt={report.name}
                className="max-w-full max-h-full rounded-xl shadow-2xl object-contain" />
              <button
                className="absolute top-4 right-4 text-white bg-gray-800/70 rounded-full w-10 h-10 flex items-center justify-center text-xl font-bold hover:bg-gray-700 transition">
                ✕
              </button>
            </div>
          )}

          {/* Foto */}
          <div className="relative mb-4">
            {report.photoURL
              ? <img
                  src={report.photoURL} alt={report.name}
                  onClick={() => setLightbox(true)}
                  className="w-full h-64 object-cover rounded-2xl shadow-sm cursor-zoom-in" />
              : <div className="w-full h-32 rounded-2xl bg-gray-100 flex items-center justify-center text-gray-400 text-sm">
                  Sin foto
                </div>
            }
            <button
              onClick={() => photoFileRef.current.click()}
              disabled={uploadingPhoto}
              className="absolute bottom-2 right-2 bg-gray-900/75 hover:bg-gray-900 text-white text-xs font-bold px-3 py-1.5 rounded-xl flex items-center gap-1.5 transition active:scale-95 disabled:opacity-60">
              {uploadingPhoto ? '⏳ Subiendo...' : '✏️ Cambiar foto'}
            </button>
            <input ref={photoFileRef} type="file" accept="image/*" className="hidden" onChange={handlePhotoFile} />
          </div>

          {/* Info card */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-4">
            <div className="h-1" style={{background: isFound ? '#16a34a' : '#dc2626'}} />
            <div className="p-5">
              <div className="flex items-start gap-3 mb-4">
                <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-2xl flex-shrink-0
                  ${isPerson ? 'bg-blue-50' : 'bg-orange-50'}`}>
                  {isPerson ? '👤' : '🐾'}
                </div>
                <div>
                  <h2 className="font-extrabold text-xl text-gray-900 leading-tight">{report.name}</h2>
                  {report.age && <p className="text-sm text-gray-500 mt-0.5">{report.age}</p>}
                  {report.animalType && (
                    <p className="text-sm text-gray-500 mt-0.5">
                      {report.animalType}{report.breed ? ` · ${report.breed}` : ''}
                    </p>
                  )}
                </div>
              </div>

              <div className="space-y-3 text-sm">
                <div className="bg-gray-50 rounded-xl p-3">
                  <p className="font-semibold text-gray-700 mb-1">Descripción</p>
                  <p className="text-gray-600 leading-relaxed">{report.description}</p>
                </div>
                {report.lastSeen && (
                  <div className="flex gap-2">
                    <span className="text-gray-400 flex-shrink-0">🗺</span>
                    <div>
                      <span className="font-semibold text-gray-700">Último lugar visto/a: </span>
                      <span className="text-gray-600">{report.lastSeen}</span>
                    </div>
                  </div>
                )}
                <div className="flex gap-2">
                  <span className="text-gray-400 flex-shrink-0">📍</span>
                  <div>
                    <span className="font-semibold text-gray-700">Zona: </span>
                    <span className="text-gray-600">{report.zone}</span>
                  </div>
                </div>
                <hr className="border-gray-100" />
                <div className="flex gap-2">
                  <span className="text-gray-400 flex-shrink-0">👤</span>
                  <div>
                    <span className="font-semibold text-gray-700">Reportado por: </span>
                    <span className="text-gray-600">{report.contactName}</span>
                  </div>
                </div>
                <div className="flex gap-2">
                  <span className="text-gray-400 flex-shrink-0">📞</span>
                  <div>
                    <span className="font-semibold text-gray-700">Contacto: </span>
                    <span className="text-gray-600 font-mono">{report.contact}</span>
                  </div>
                </div>
                <p className="text-xs text-gray-400 pt-1">{timeAgo(report.createdAt)}</p>
              </div>
            </div>
          </div>

          {/* Acciones */}
          <div className="flex flex-col gap-2.5">
            <button onClick={shareWhatsApp}
              className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-colors shadow-sm">
              📲 Compartir por WhatsApp
            </button>
            <div className="grid grid-cols-2 gap-2.5">
              <a href={`tel:${report.contact}`}
                className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-colors shadow-sm text-sm text-center">
                📞 Llamar
              </a>
              <a href={`https://wa.me/${report.contact.replace(/\D/g,'')}`} target="_blank"
                className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-colors shadow-sm text-sm text-center">
                💬 WhatsApp
              </a>
            </div>
            {!isFound && (
              <button onClick={() => setShowFound(true)}
                className="w-full border-2 border-green-500 text-green-700 font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition hover:bg-green-50">
                ✅ Marcar como Encontrado/a
              </button>
            )}
          </div>

          {showMarkFound && (
            <MarkFoundModal
              report={report}
              onClose={() => setShowFound(false)}
              onSuccess={() => setShowFound(false)}
            />
          )}

          {cropSrc && (
            <CropModal
              imageSrc={cropSrc}
              onConfirm={handleCropConfirm}
              onCancel={() => setCropSrc(null)}
            />
          )}
        </div>
      );
    }

    // ─── MARK FOUND MODAL ──────────────────────────────────────────────────────
    function MarkFoundModal({ report, onClose, onSuccess }) {
      const [code, setCode]     = useState('');
      const [saving, setSaving] = useState(false);

      const confirm = async () => {
        if (code.trim().toUpperCase() !== report.editCode) {
          toast('Código incorrecto. Revisa el que recibiste al crear el reporte.', 'error');
          return;
        }
        setSaving(true);
        try {
          await db.collection('reports').doc(report.id).update({ status: 'encontrado' });
          toast('¡Reporte actualizado! Que alegría 🙏', 'success');
          onSuccess();
        } catch {
          toast('Error al actualizar', 'error');
          setSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e => e.stopPropagation()}>
            <h3 className="font-bold text-lg text-gray-900 mb-1">Marcar como encontrado/a</h3>
            <p className="text-sm text-gray-500 mb-4">
              Ingresa el código de 6 caracteres que recibiste al crear el reporte.
            </p>
            <input
              className="w-full border border-gray-200 rounded-xl px-4 py-4 text-center text-2xl font-mono tracking-widest uppercase mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
              placeholder="XXXXXX"
              value={code}
              onChange={e => setCode(e.target.value.toUpperCase())}
              maxLength={6}
              autoFocus
            />
            <div className="flex gap-3">
              <button onClick={onClose}
                className="flex-1 border border-gray-200 text-gray-600 py-3 rounded-xl font-semibold hover:bg-gray-50 transition">
                Cancelar
              </button>
              <button onClick={confirm} disabled={saving || code.length < 6}
                className="flex-1 bg-green-500 hover:bg-green-600 disabled:opacity-50 text-white py-3 rounded-xl font-bold transition">
                {saving ? 'Guardando...' : '✅ Confirmar'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── SUCCESS MODAL ─────────────────────────────────────────────────────────
    function SuccessModal({ data, onClose }) {
      const copy = () => {
        navigator.clipboard?.writeText(data.code)
          .then(() => toast('Código copiado'))
          .catch(() => toast('Copia el código manualmente', 'info'));
      };
      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-5">
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl">
            <div className="text-5xl mb-3">🙏</div>
            <h3 className="font-bold text-xl text-gray-900 mb-2">Reporte publicado</h3>
            <p className="text-sm text-gray-500 mb-5">
              El reporte de <strong>{data.name}</strong> ya está visible para todos.
              Compártelo para que llegue a más personas.
            </p>
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-5">
              <p className="text-xs font-bold text-amber-700 mb-2 uppercase tracking-wide">
                ⚠ Guarda este código
              </p>
              <div className="text-4xl font-mono font-black tracking-widest text-gray-900 my-2 select-all">
                {data.code}
              </div>
              <p className="text-xs text-amber-600 mb-2">Lo necesitarás para marcar como encontrado</p>
              <button onClick={copy} className="text-sm text-blue-500 font-semibold">
                📋 Copiar código
              </button>
            </div>
            <button onClick={onClose}
              className="w-full text-white font-bold py-4 rounded-2xl text-base active:scale-95 transition shadow-md"
              style={{background: VZ_GRAD}}>
              Ver todos los reportes →
            </button>
          </div>
        </div>
      );
    }

    // ─── APP ───────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView]             = useState('feed');
      const [selectedReport, setReport] = useState(null);
      const [successData, setSuccess]   = useState(null);
      const [sidebarOpen, setSidebar]   = useState(false);
      const [counts, setCounts]         = useState({ total: 0, missing: 0, found: 0 });

      useEffect(() => {
        const unsub = db.collection('reports').onSnapshot(snap => {
          const docs = snap.docs.map(d => d.data());
          setCounts({
            total:   docs.length,
            missing: docs.filter(d => d.status === 'desaparecido').length,
            found:   docs.filter(d => d.status === 'encontrado').length,
          });
        });
        return unsub;
      }, []);

      const goFeed    = () => { setReport(null); setView('feed'); };
      const goNew     = () => setView('new');
      const goDetail  = (r) => { setReport(r); setView('detail'); };
      const onSuccess = (data) => { setSuccess(data); setView('feed'); };

      return (
        <div className="min-h-screen bg-gray-100">
          <Toasts />

          <Sidebar
            view={view}
            onGoFeed={goFeed}
            onGoNew={goNew}
            isOpen={sidebarOpen}
            onClose={() => setSidebar(false)}
            counts={counts}
          />

          {/* Main — desplazado en desktop */}
          <div className="lg-ml-64">
            <MobileHeader
              onGoFeed={goFeed}
              onGoNew={goNew}
              onMenuOpen={() => setSidebar(true)}
            />
            <main>
              {view === 'feed'   && <FeedView onSelect={goDetail} onNew={goNew} />}
              {view === 'new'    && <NewReportView onBack={goFeed} onSuccess={onSuccess} />}
              {view === 'detail' && selectedReport &&
                <DetailView report={selectedReport} onBack={goFeed} />}
            </main>
          </div>

          {successData && <SuccessModal data={successData} onClose={() => setSuccess(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
