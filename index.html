<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TelereportoSOS Venezuela</title>
  <meta name="description" content="Reporta y busca personas y mascotas desaparecidas tras el sismo en Venezuela" />
  <meta name="theme-color" content="#dc2626" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- Cloudinary — no requiere SDK, usa fetch directo -->

  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script>
    // ─── FIREBASE CONFIG ────────────────────────────────────────────────────────
    // TODO: Reemplaza estos valores con los de tu nuevo proyecto Firebase
    // Crea el proyecto en: https://console.firebase.google.com
    // Habilita: Firestore Database + Storage
    const firebaseConfig = {
      apiKey:            "AIzaSyBdpDMBExJTD0hgGGRfjNTItrKeG0HkvLY",
      authDomain:        "tlososvzla.firebaseapp.com",
      projectId:         "tlososvzla",
      storageBucket:     "tlososvzla.firebasestorage.app",
      messagingSenderId: "50186646358",
      appId:             "1:50186646358:web:f7c495cc19146b4d6d9cf7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ─── CLOUDINARY CONFIG ──────────────────────────────────────────────────────
    // TODO: Reemplaza con tu Cloud Name y Upload Preset (unsigned)
    const CLOUDINARY_URL    = 'https://api.cloudinary.com/v1_1/dgghapacj/image/upload';
    const CLOUDINARY_PRESET = 'tlososvzla';
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // URL base del sitio (actualizar al tener la URL de Vercel)
    const SITE_URL = 'https://telereportosos.vercel.app';

    // ─── TOAST ─────────────────────────────────────────────────────────────────
    let _setToasts = null;
    const toast = (msg, type = 'success') => {
      if (_setToasts) _setToasts(p => [...p, { id: Date.now() + Math.random(), msg, type }]);
    };

    function Toasts() {
      const [toasts, setToasts] = useState([]);
      _setToasts = setToasts;
      useEffect(() => {
        if (!toasts.length) return;
        const t = setTimeout(() => setToasts(p => p.slice(1)), 3800);
        return () => clearTimeout(t);
      }, [toasts]);
      return (
        <div className="fixed top-4 left-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className={`px-4 py-3 rounded-xl shadow-lg text-white text-sm font-semibold text-center
              ${t.type === 'error' ? 'bg-red-600' : t.type === 'info' ? 'bg-blue-600' : 'bg-green-600'}`}>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }

    // ─── HELPERS ───────────────────────────────────────────────────────────────
    const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

    const timeAgo = (ts) => {
      if (!ts) return '';
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60) return 'hace un momento';
      if (diff < 3600) return `hace ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `hace ${Math.floor(diff / 3600)} h`;
      return `hace ${Math.floor(diff / 86400)} días`;
    };

    const ZONES = [
      'Libertador (Caracas)', 'Chacao', 'Baruta', 'El Hatillo', 'Sucre (Petare)',
      'La Guaira / Vargas', 'Los Teques / Miranda', 'Guarenas / Guatire',
      'Maracay / Aragua', 'Valencia / Carabobo', 'Maracaibo / Zulia',
      'Barquisimeto / Lara', 'San Cristóbal / Táchira', 'Otra zona'
    ];

    const ANIMAL_TYPES = ['Perro', 'Gato', 'Ave', 'Reptil', 'Otro'];

    // ─── HEADER ────────────────────────────────────────────────────────────────
    function Header({ onNew, onHome }) {
      return (
        <header className="bg-red-600 text-white shadow-lg sticky top-0 z-40">
          <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <button onClick={onHome} className="flex items-center gap-2 text-left">
              <span className="text-2xl">🆘</span>
              <div>
                <div className="font-bold text-base leading-tight">TelereportoSOS</div>
                <div className="text-xs text-red-200 leading-tight">Venezuela · Sismo Junio 2026</div>
              </div>
            </button>
            <button
              onClick={onNew}
              className="bg-white text-red-600 font-bold px-4 py-2 rounded-lg text-sm shadow active:scale-95 transition"
            >
              + Reportar
            </button>
          </div>
        </header>
      );
    }

    // ─── REPORT CARD ───────────────────────────────────────────────────────────
    function ReportCard({ report, onClick }) {
      const isFound  = report.status === 'encontrado';
      const isPerson = report.type === 'persona';

      const shareWhatsApp = (e) => {
        e.stopPropagation();
        const emoji = isPerson ? '👤' : '🐾';
        const text = [
          `🆘 *REPORTE SOS VZL*`,
          `${emoji} *${report.name}*${report.age ? ` (${report.age})` : ''}${report.animalType ? ` — ${report.animalType}` : ''}`,
          `📍 *Zona:* ${report.zone}`,
          report.lastSeen ? `🗺 *Visto en:* ${report.lastSeen}` : null,
          `📝 ${report.description?.substring(0, 120)}`,
          `📞 *Contacto:* ${report.contactName} — ${report.contact}`,
          ``,
          `Ver más reportes: ${SITE_URL}`,
        ].filter(Boolean).join('\n');
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      };

      return (
        <div
          onClick={() => onClick(report)}
          className={`bg-white rounded-2xl shadow-sm border-l-4 p-4 cursor-pointer active:scale-[0.99] transition
            ${isFound ? 'border-green-500' : 'border-red-500'}`}
        >
          <div className="flex gap-3">
            {report.photoURL
              ? <img src={report.photoURL} alt={report.name} className="w-16 h-16 rounded-xl object-cover flex-shrink-0" />
              : <div className={`w-16 h-16 rounded-xl flex items-center justify-center flex-shrink-0 text-3xl
                  ${isPerson ? 'bg-blue-100' : 'bg-orange-100'}`}>
                  {isPerson ? '👤' : '🐾'}
                </div>
            }
            <div className="flex-1 min-w-0">
              <div className="flex items-start justify-between gap-2">
                <h3 className="font-bold text-gray-900 truncate">{report.name}</h3>
                <span className={`flex-shrink-0 text-xs font-bold px-2 py-0.5 rounded-full
                  ${isFound ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                  {isFound ? '✓ ENCONTRADO' : '⚠ BUSCANDO'}
                </span>
              </div>
              <p className="text-sm text-gray-500 mt-0.5 line-clamp-2">{report.description}</p>
              <div className="flex items-center gap-3 mt-1.5 text-xs text-gray-400">
                <span>📍 {report.zone}</span>
                <span>{timeAgo(report.createdAt)}</span>
              </div>
            </div>
          </div>
          <div className="flex gap-2 mt-3">
            <button
              onClick={shareWhatsApp}
              className="flex-1 bg-green-500 text-white text-sm font-semibold py-2.5 rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition"
            >
              📲 Compartir
            </button>
            <button className="px-5 bg-gray-100 text-gray-700 text-sm font-semibold py-2.5 rounded-xl active:scale-95 transition">
              Ver más
            </button>
          </div>
        </div>
      );
    }

    // ─── FEED VIEW ─────────────────────────────────────────────────────────────
    function FeedView({ onSelect, onNew }) {
      const [reports, setReports]       = useState([]);
      const [loading, setLoading]       = useState(true);
      const [filterType, setFilterType] = useState('all');
      const [filterStatus, setFilterStatus] = useState('desaparecido');
      const [search, setSearch]         = useState('');

      useEffect(() => {
        const unsub = db.collection('reports')
          .orderBy('createdAt', 'desc')
          .limit(200)
          .onSnapshot(
            snap => { setReports(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); },
            ()   => { toast('Error cargando reportes', 'error'); setLoading(false); }
          );
        return unsub;
      }, []);

      const filtered = reports.filter(r => {
        if (filterType !== 'all' && r.type !== filterType) return false;
        if (filterStatus !== 'all' && r.status !== filterStatus) return false;
        if (search) {
          const q = search.toLowerCase();
          return (r.name?.toLowerCase().includes(q) || r.zone?.toLowerCase().includes(q) || r.description?.toLowerCase().includes(q));
        }
        return true;
      });

      const missing = reports.filter(r => r.status === 'desaparecido').length;
      const found   = reports.filter(r => r.status === 'encontrado').length;

      return (
        <div className="max-w-2xl mx-auto px-4 pb-12">
          {/* Banner emergencia */}
          <div className="bg-red-50 border border-red-200 rounded-2xl p-4 mt-4 mb-3 text-center">
            <p className="font-bold text-red-800">🆘 Sismo 7.5 — Venezuela · Junio 2026</p>
            <p className="text-red-700 text-sm mt-1">
              Reporta personas y mascotas desaparecidas.<br/>
              <strong>Comparte el link para que llegue a más gente.</strong>
            </p>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-2 mb-4">
            <div className="bg-white rounded-2xl p-3 text-center shadow-sm">
              <div className="text-2xl font-bold text-gray-800">{reports.length}</div>
              <div className="text-xs text-gray-400 mt-0.5">Total</div>
            </div>
            <div className="bg-red-50 rounded-2xl p-3 text-center shadow-sm">
              <div className="text-2xl font-bold text-red-600">{missing}</div>
              <div className="text-xs text-red-400 mt-0.5">Buscando</div>
            </div>
            <div className="bg-green-50 rounded-2xl p-3 text-center shadow-sm">
              <div className="text-2xl font-bold text-green-600">{found}</div>
              <div className="text-xs text-green-500 mt-0.5">Encontrados</div>
            </div>
          </div>

          {/* Búsqueda */}
          <input
            type="search"
            placeholder="🔍 Buscar por nombre o zona..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-red-400 bg-white"
          />

          {/* Filtro tipo */}
          <div className="flex gap-2 mb-3 overflow-x-auto pb-1 scrollbar-hide">
            {[['all','Todos'],['persona','👤 Personas'],['mascota','🐾 Mascotas']].map(([v,l]) => (
              <button key={v} onClick={() => setFilterType(v)}
                className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition
                  ${filterType === v ? 'bg-red-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>
                {l}
              </button>
            ))}
          </div>

          {/* Filtro estado */}
          <div className="flex gap-2 mb-4">
            {[['all','Todos'],['desaparecido','⚠ Buscando'],['encontrado','✓ Encontrados']].map(([v,l]) => (
              <button key={v} onClick={() => setFilterStatus(v)}
                className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold transition
                  ${filterStatus === v ? 'bg-gray-800 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>
                {l}
              </button>
            ))}
          </div>

          {/* Lista */}
          {loading ? (
            <div className="text-center py-16 text-gray-400">
              <div className="text-4xl mb-3">⏳</div>
              <p>Cargando reportes...</p>
            </div>
          ) : filtered.length === 0 ? (
            <div className="text-center py-16 text-gray-400">
              <div className="text-5xl mb-3">{reports.length === 0 ? '📋' : '🔍'}</div>
              <p className="font-semibold text-gray-600">{reports.length === 0 ? 'Aún no hay reportes' : 'Sin resultados'}</p>
              <p className="text-sm mt-1">{reports.length === 0 ? 'Sé el primero en reportar' : 'Prueba cambiando los filtros'}</p>
              {reports.length === 0 && (
                <button onClick={onNew} className="mt-5 bg-red-600 text-white px-8 py-4 rounded-2xl font-bold text-base">
                  + Crear primer reporte
                </button>
              )}
            </div>
          ) : (
            <div className="flex flex-col gap-3">
              {filtered.map(r => <ReportCard key={r.id} report={r} onClick={onSelect} />)}
            </div>
          )}
        </div>
      );
    }

    // ─── NEW REPORT FORM ───────────────────────────────────────────────────────
    function NewReportView({ onBack, onSuccess }) {
      const [type, setType]         = useState('persona');
      const [saving, setSaving]     = useState(false);
      const [photo, setPhoto]       = useState(null);
      const [preview, setPreview]   = useState(null);
      const [form, setForm]         = useState({
        name: '', age: '', animalType: 'Perro', breed: '',
        description: '', lastSeen: '', zone: '',
        contactName: '', contact: ''
      });
      const fileRef = useRef();
      const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const handlePhoto = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { toast('La foto debe ser menor a 10 MB', 'error'); return; }
        setPhoto(file);
        setPreview(URL.createObjectURL(file));
      };

      const uploadPhoto = async () => {
        if (!photo) return null;
        try {
          const fd = new FormData();
          fd.append('file', photo);
          fd.append('upload_preset', CLOUDINARY_PRESET);
          const res  = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
          const data = await res.json();
          return data.secure_url || null;
        } catch { return null; }
      };

      const submit = async () => {
        if (!form.name.trim())        { toast('Ingresa el nombre', 'error'); return; }
        if (!form.description.trim()) { toast('Agrega una descripción', 'error'); return; }
        if (!form.zone)               { toast('Selecciona la zona', 'error'); return; }
        if (!form.contactName.trim()) { toast('Ingresa tu nombre', 'error'); return; }
        if (!form.contact.trim())     { toast('Ingresa un número de contacto', 'error'); return; }

        setSaving(true);
        try {
          const code   = generateCode();
          const docRef = await db.collection('reports').add({
            type,
            status:      'desaparecido',
            name:        form.name.trim(),
            age:         type === 'persona' ? form.age.trim() : null,
            animalType:  type === 'mascota' ? form.animalType : null,
            breed:       type === 'mascota' ? form.breed.trim() : null,
            description: form.description.trim(),
            lastSeen:    form.lastSeen.trim(),
            zone:        form.zone,
            contactName: form.contactName.trim(),
            contact:     form.contact.trim(),
            photoURL:    null,
            editCode:    code,
            createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
          });

          const photoURL = await uploadPhoto();
          if (photoURL) await docRef.update({ photoURL });

          onSuccess({ code, name: form.name.trim() });
        } catch {
          toast('Error al guardar. Intenta de nuevo.', 'error');
          setSaving(false);
        }
      };

      const inp  = "w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 bg-white";
      const lbl  = "block text-sm font-semibold text-gray-700 mb-1.5";
      const card = "bg-white rounded-2xl shadow-sm p-4 mb-4 flex flex-col gap-4";

      return (
        <div className="max-w-2xl mx-auto px-4 pb-12">
          <div className="flex items-center gap-3 py-4">
            <button onClick={onBack} className="text-gray-500 text-lg p-1">←</button>
            <h2 className="font-bold text-lg text-gray-900">Nuevo Reporte</h2>
          </div>

          {/* Tipo */}
          <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
            <p className={lbl}>¿Qué estás reportando?</p>
            <div className="grid grid-cols-2 gap-3">
              {[['persona','👤','Persona desaparecida'],['mascota','🐾','Mascota desaparecida']].map(([v,icon,l]) => (
                <button key={v} onClick={() => setType(v)}
                  className={`py-4 rounded-2xl border-2 font-bold text-sm transition
                    ${type === v ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-200 text-gray-400'}`}>
                  <div className="text-3xl mb-1">{icon}</div>
                  {l}
                </button>
              ))}
            </div>
          </div>

          {/* Datos principales */}
          <div className={card}>
            <div>
              <label className={lbl}>{type === 'persona' ? 'Nombre completo *' : 'Nombre de la mascota'}</label>
              <input className={inp}
                placeholder={type === 'persona' ? 'Ej: María Rodríguez' : 'Ej: Max (o "sin nombre")'}
                value={form.name} onChange={e => set('name', e.target.value)} />
            </div>

            {type === 'persona' && (
              <div>
                <label className={lbl}>Edad</label>
                <input className={inp} placeholder="Ej: 34 años"
                  value={form.age} onChange={e => set('age', e.target.value)} />
              </div>
            )}

            {type === 'mascota' && (<>
              <div>
                <label className={lbl}>Tipo de animal *</label>
                <select className={inp} value={form.animalType} onChange={e => set('animalType', e.target.value)}>
                  {ANIMAL_TYPES.map(a => <option key={a}>{a}</option>)}
                </select>
              </div>
              <div>
                <label className={lbl}>Raza / Color</label>
                <input className={inp} placeholder="Ej: Labrador amarillo, mediano"
                  value={form.breed} onChange={e => set('breed', e.target.value)} />
              </div>
            </>)}

            <div>
              <label className={lbl}>{type === 'persona' ? 'Descripción física *' : 'Descripción *'}</label>
              <textarea className={`${inp} resize-none`} rows={3}
                placeholder={type === 'persona'
                  ? 'Ropa que llevaba, altura, color de cabello, señas particulares...'
                  : 'Tamaño, color, collar, señas particulares...'}
                value={form.description} onChange={e => set('description', e.target.value)} />
            </div>

            <div>
              <label className={lbl}>Último lugar donde fue visto/a</label>
              <input className={inp} placeholder="Ej: Av. Francisco de Miranda, frente al CC Sambil"
                value={form.lastSeen} onChange={e => set('lastSeen', e.target.value)} />
            </div>

            <div>
              <label className={lbl}>Zona / Estado *</label>
              <select className={inp} value={form.zone} onChange={e => set('zone', e.target.value)}>
                <option value="">Selecciona la zona...</option>
                {ZONES.map(z => <option key={z}>{z}</option>)}
              </select>
            </div>
          </div>

          {/* Foto */}
          <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
            <p className={lbl}>Foto — muy importante para identificar</p>
            {preview ? (
              <div className="relative">
                <img src={preview} alt="preview" className="w-full h-52 object-cover rounded-xl" />
                <button onClick={() => { setPhoto(null); setPreview(null); }}
                  className="absolute top-2 right-2 bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm font-bold shadow">
                  ✕
                </button>
              </div>
            ) : (
              <button onClick={() => fileRef.current.click()}
                className="w-full h-36 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center text-gray-400 active:border-red-400 transition">
                <span className="text-4xl">📷</span>
                <span className="text-sm mt-2">Toca para agregar foto</span>
                <span className="text-xs text-gray-300 mt-1">Cámara o galería</span>
              </button>
            )}
            <input ref={fileRef} type="file" accept="image/*" capture="environment"
              className="hidden" onChange={handlePhoto} />
          </div>

          {/* Contacto */}
          <div className={card}>
            <div>
              <label className={lbl}>Tu nombre *</label>
              <input className={inp} placeholder="¿Quién hace el reporte?"
                value={form.contactName} onChange={e => set('contactName', e.target.value)} />
            </div>
            <div>
              <label className={lbl}>WhatsApp / Teléfono de contacto *</label>
              <input className={inp} type="tel" placeholder="+58 412 000 0000"
                value={form.contact} onChange={e => set('contact', e.target.value)} />
            </div>
          </div>

          <button onClick={submit} disabled={saving}
            className="w-full bg-red-600 hover:bg-red-700 disabled:opacity-60 text-white font-bold py-4 rounded-2xl text-lg transition active:scale-95">
            {saving ? '⏳ Publicando...' : '🆘 Publicar Reporte'}
          </button>
        </div>
      );
    }

    // ─── DETAIL VIEW ───────────────────────────────────────────────────────────
    function DetailView({ report: initial, onBack }) {
      const [report, setReport]           = useState(initial);
      const [showMarkFound, setShowFound] = useState(false);
      const isFound  = report.status === 'encontrado';
      const isPerson = report.type === 'persona';

      // Escuchar cambios en tiempo real
      useEffect(() => {
        const unsub = db.collection('reports').doc(initial.id).onSnapshot(
          doc => { if (doc.exists) setReport({ id: doc.id, ...doc.data() }); }
        );
        return unsub;
      }, [initial.id]);

      const shareWhatsApp = () => {
        const emoji = isPerson ? '👤' : '🐾';
        const lines = [
          `🆘 *REPORTE SOS VZL*`,
          `${emoji} *${report.name}*${report.age ? ` (${report.age})` : ''}${report.animalType ? ` — ${report.animalType}` : ''}`,
          `📍 *Zona:* ${report.zone}`,
          report.lastSeen ? `🗺 *Visto en:* ${report.lastSeen}` : null,
          `📝 ${report.description}`,
          `📞 *Contacto:* ${report.contactName} — ${report.contact}`,
          ``,
          `Ver más reportes: ${SITE_URL}`,
        ].filter(Boolean).join('\n');
        window.open(`https://wa.me/?text=${encodeURIComponent(lines)}`, '_blank');
      };

      return (
        <div className="max-w-2xl mx-auto px-4 pb-12">
          <div className="flex items-center gap-3 py-4">
            <button onClick={onBack} className="text-gray-500 text-lg p-1">←</button>
            <h2 className="font-bold text-lg text-gray-900">Detalle del reporte</h2>
          </div>

          {/* Status banner */}
          <div className={`rounded-2xl p-3 mb-4 text-center font-bold text-base
            ${isFound ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
            {isFound ? '✅ ¡Esta persona/mascota fue ENCONTRADA!' : '⚠️ DESAPARECIDO/A — Necesita ayuda'}
          </div>

          {/* Foto */}
          {report.photoURL && (
            <img src={report.photoURL} alt={report.name}
              className="w-full h-64 object-cover rounded-2xl mb-4" />
          )}

          {/* Info */}
          <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
            <div className="flex items-start gap-3 mb-4">
              <span className="text-4xl">{isPerson ? '👤' : '🐾'}</span>
              <div>
                <h2 className="font-bold text-xl text-gray-900">{report.name}</h2>
                {report.age && <p className="text-sm text-gray-500">{report.age}</p>}
                {report.animalType && (
                  <p className="text-sm text-gray-500">{report.animalType}{report.breed ? ` · ${report.breed}` : ''}</p>
                )}
              </div>
            </div>

            <div className="space-y-3 text-sm">
              <div>
                <span className="font-semibold text-gray-700">Descripción:</span>
                <p className="text-gray-600 mt-1 leading-relaxed">{report.description}</p>
              </div>
              {report.lastSeen && (
                <div>
                  <span className="font-semibold text-gray-700">Último lugar visto/a:</span>
                  <p className="text-gray-600 mt-0.5">{report.lastSeen}</p>
                </div>
              )}
              <div className="flex items-center gap-2">
                <span className="font-semibold text-gray-700">Zona:</span>
                <span className="text-gray-600">{report.zone}</span>
              </div>
              <hr className="border-gray-100" />
              <div className="flex items-center gap-2">
                <span className="font-semibold text-gray-700">Reportado por:</span>
                <span className="text-gray-600">{report.contactName}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="font-semibold text-gray-700">Contacto:</span>
                <span className="text-gray-600 font-mono">{report.contact}</span>
              </div>
              <p className="text-xs text-gray-400 pt-1">{timeAgo(report.createdAt)}</p>
            </div>
          </div>

          {/* Acciones */}
          <div className="flex flex-col gap-3">
            <button onClick={shareWhatsApp}
              className="w-full bg-green-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 text-base active:scale-95 transition">
              📲 Compartir por WhatsApp
            </button>
            <a href={`tel:${report.contact}`}
              className="w-full bg-blue-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 text-base active:scale-95 transition text-center">
              📞 Llamar al contacto
            </a>
            <a href={`https://wa.me/${report.contact.replace(/\D/g, '')}`} target="_blank"
              className="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 text-base active:scale-95 transition text-center">
              💬 WhatsApp al contacto
            </a>
            {!isFound && (
              <button onClick={() => setShowFound(true)}
                className="w-full border-2 border-green-500 text-green-700 font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition">
                ✅ Marcar como Encontrado/a
              </button>
            )}
          </div>

          {showMarkFound && (
            <MarkFoundModal
              report={report}
              onClose={() => setShowFound(false)}
              onSuccess={() => setShowFound(false)}
            />
          )}
        </div>
      );
    }

    // ─── MARK FOUND MODAL ──────────────────────────────────────────────────────
    function MarkFoundModal({ report, onClose, onSuccess }) {
      const [code, setCode]   = useState('');
      const [saving, setSaving] = useState(false);

      const confirm = async () => {
        if (code.trim().toUpperCase() !== report.editCode) {
          toast('Código incorrecto. Revisa el código que recibiste al crear el reporte.', 'error');
          return;
        }
        setSaving(true);
        try {
          await db.collection('reports').doc(report.id).update({ status: 'encontrado' });
          toast('¡Reporte actualizado! Que alegría 🙏', 'success');
          onSuccess();
        } catch {
          toast('Error al actualizar', 'error');
          setSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
            <h3 className="font-bold text-lg text-gray-900 mb-1">Marcar como encontrado/a</h3>
            <p className="text-sm text-gray-500 mb-4">
              Ingresa el código de 6 caracteres que recibiste cuando creaste el reporte.
            </p>
            <input
              className="w-full border border-gray-300 rounded-xl px-4 py-4 text-center text-2xl font-mono tracking-widest uppercase mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
              placeholder="XXXXXX"
              value={code}
              onChange={e => setCode(e.target.value.toUpperCase())}
              maxLength={6}
              autoFocus
            />
            <div className="flex gap-3">
              <button onClick={onClose}
                className="flex-1 border border-gray-300 text-gray-600 py-3 rounded-xl font-semibold">
                Cancelar
              </button>
              <button onClick={confirm} disabled={saving || code.length < 6}
                className="flex-1 bg-green-500 disabled:opacity-50 text-white py-3 rounded-xl font-bold">
                {saving ? 'Guardando...' : '✅ Confirmar'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── SUCCESS MODAL ─────────────────────────────────────────────────────────
    function SuccessModal({ data, onClose }) {
      const copy = () => {
        navigator.clipboard?.writeText(data.code)
          .then(() => toast('Código copiado al portapapeles'))
          .catch(() => toast('Copia el código manualmente', 'info'));
      };

      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-5">
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl">
            <div className="text-5xl mb-3">🙏</div>
            <h3 className="font-bold text-xl text-gray-900 mb-2">Reporte publicado</h3>
            <p className="text-sm text-gray-500 mb-5">
              El reporte de <strong>{data.name}</strong> ya está visible para todos.
              Compártelo para que llegue a más personas.
            </p>

            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-4">
              <p className="text-xs font-semibold text-amber-700 mb-2">
                ⚠ GUARDA ESTE CÓDIGO — lo necesitarás para marcar como encontrado
              </p>
              <div className="text-4xl font-mono font-black tracking-widest text-gray-900 my-2">
                {data.code}
              </div>
              <button onClick={copy} className="text-sm text-blue-500 font-medium mt-1">
                📋 Copiar código
              </button>
            </div>

            <button onClick={onClose}
              className="w-full bg-red-600 text-white font-bold py-4 rounded-2xl text-base active:scale-95 transition">
              Ver todos los reportes →
            </button>
          </div>
        </div>
      );
    }

    // ─── APP ───────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView]             = useState('feed');
      const [selectedReport, setReport] = useState(null);
      const [successData, setSuccess]   = useState(null);

      const goFeed   = ()  => { setReport(null); setView('feed'); };
      const goNew    = ()  => setView('new');
      const goDetail = (r) => { setReport(r); setView('detail'); };

      const onSuccess = (data) => {
        setSuccess(data);
        setView('feed');
      };

      return (
        <>
          <Toasts />
          <Header onNew={goNew} onHome={goFeed} />
          {view === 'feed'   && <FeedView onSelect={goDetail} onNew={goNew} />}
          {view === 'new'    && <NewReportView onBack={goFeed} onSuccess={onSuccess} />}
          {view === 'detail' && selectedReport &&
            <DetailView report={selectedReport} onBack={goFeed} />}
          {successData && <SuccessModal data={successData} onClose={() => setSuccess(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
